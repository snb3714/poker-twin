@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');

:root{
  --bg:#090D13; --surface:#121924; --raised:#18212E; --line:#2A3547;
  --text:#EAF1F8; --mut:#8A98AA;
  --gold:#D7A54A; --green:#4FD18B; --red:#EE5C63; --focus:#6BA5FF;
  --disp:'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --body:'Inter', ui-sans-serif, system-ui, sans-serif;
  --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
.pt-root{min-height:100vh; min-height:100dvh; background:radial-gradient(120% 120% at 50% -20%, #1A2535 0%, var(--bg) 48%); color:var(--text); font-family:var(--body); display:flex; justify-content:center;}
.pt-frame{width:100%; max-width:480px; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; position:relative;}

.pt-brand{font-family:var(--disp); font-weight:700; font-size:16px; letter-spacing:2px; color:var(--gold);}
.pt-question{font-family:var(--disp); font-weight:700; font-size:22px; letter-spacing:.2px; margin:12px 0 8px;}
.pt-sub{color:var(--mut); font-size:13px; margin-bottom:10px;}
.pt-mut{color:var(--mut);}
.pt-hero{color:var(--gold);} .pt-vill{color:#9DB4C9;}
.pt-win{color:var(--green); font-weight:600;} .pt-loss{color:var(--red); font-weight:600;}

.pt-btn{border:1px solid var(--line); background:var(--surface); color:var(--text);
  border-radius:10px; font-family:var(--disp); font-weight:600; letter-spacing:.4px;
  cursor:pointer; transition:transform .08s ease, border-color .12s ease, background .12s ease; width:100%;}
.pt-btn:hover{transform:translateY(-1px); border-color:#3C4B63; background:#172131;}
.pt-btn:active{transform:translateY(0); background:var(--raised);}
.pt-btn:disabled{opacity:.38; pointer-events:none;}
.pt-btn-lg{min-height:54px; font-size:19px; padding:0 14px;}
.pt-btn-xl{min-height:52px; font-size:18px; letter-spacing:1px;}
.pt-btn-md{min-height:48px; font-size:16px;}
.pt-btn-sm{min-height:38px; font-size:13px; width:auto; padding:0 12px;}
.pt-btn-gold{background:var(--gold); border-color:#B6862B; color:#1A1408;}
.pt-btn-green{background:rgba(79,209,139,.14); border-color:rgba(79,209,139,.6); color:#66DBA0;}
.pt-btn-red{background:rgba(238,92,99,.14); border-color:rgba(238,92,99,.64); color:#FF868C;}
.pt-btn-villain{background:rgba(107,165,255,.09); border-color:rgba(107,165,255,.45); color:#AFCFFE;}
.pt-btn-ghost{background:transparent; border-color:var(--line); color:#A2B0C3;}

.pt-screen{display:flex; flex-direction:column; flex:1; padding:12px 16px 22px;}
.pt-stack{display:flex; flex-direction:column; gap:10px;}
.pt-row{display:flex; gap:8px;}
.pt-wrap{flex-wrap:wrap;}
.pt-grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.pt-grid4{display:grid; grid-template-columns:repeat(4,1fr); gap:6px;}

.pt-flow{display:flex; flex-direction:column; flex:1;}
.pt-flowbar{display:flex; align-items:center; gap:10px; padding:6px 10px 0; justify-content:space-between;}
.pt-backbtn,.pt-cancel{background:none; border:none; color:var(--mut); font-family:var(--disp);
  font-size:17px; letter-spacing:1px; cursor:pointer; padding:8px;}
.pt-cancel{margin-left:auto; font-size:19px;}
.pt-flowcrumb{font-family:var(--disp); font-size:16px; letter-spacing:1px; color:var(--mut); display:flex; gap:4px; align-items:center;}

.pt-picked{display:flex; gap:8px; margin-bottom:10px;}
.pt-cardslot{width:48px; height:66px; border:1px dashed var(--line); border-radius:10px;
  display:flex; align-items:center; justify-content:center; font-size:20px; background:var(--surface); color:var(--mut);}
.pt-cardslot.filled{border-style:solid; border-color:var(--gold);}
.pt-rankgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.pt-rankkey{min-height:48px; font-family:var(--disp); font-size:20px; font-weight:600;
  background:var(--surface); border:1px solid var(--line); border-radius:10px; color:var(--text); cursor:pointer;}
.pt-rankkey:active{background:var(--raised);}
.pt-rankkey.sel{border-color:var(--gold); color:var(--gold); background:rgba(230,180,76,.1);}
.pt-rankkey:disabled{opacity:.25; pointer-events:none;}
.pt-suitrow{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:10px;}
.pt-suitkey{min-height:60px; font-size:30px; background:var(--surface); border:1px solid var(--line);
  border-radius:12px; cursor:pointer;}
.pt-suitkey:disabled{opacity:.2; pointer-events:none;}
.pt-suitkey:active{background:var(--raised);}

.pt-board{display:flex; align-items:center; gap:8px; padding:10px 0 0;}
.pt-boardcard{background:var(--surface); border:1px solid var(--line); border-radius:8px;
  padding:6px 9px; font-size:20px;}
.pt-streettag{margin-left:auto; font-family:var(--disp); letter-spacing:2px; text-transform:uppercase;
  color:var(--mut); font-size:14px;}

.pt-modal{position:fixed; inset:0; background:rgba(0,0,0,.72); display:flex; align-items:flex-end; justify-content:center; z-index:20;}
.pt-modal-card{width:100%; max-width:480px; background:var(--bg); border-top:1px solid var(--line);
  border-radius:20px 20px 0 0; padding:18px 16px 26px; max-height:86vh; overflow:auto;}
.pt-numval{font-family:var(--disp); font-size:34px; font-weight:700; margin:4px 0 12px;}
.pt-unit{font-size:20px; color:var(--mut);}
.pt-numgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
.pt-numkey{min-height:52px; font-family:var(--disp); font-size:22px; background:var(--surface);
  border:1px solid var(--line); border-radius:12px; color:var(--text); cursor:pointer;}
.pt-numkey:active{background:var(--raised);}

.pt-home{display:flex; flex-direction:column; padding:16px 16px 12px; gap:10px;
  height:calc(100vh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
  height:calc(100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
  overflow:hidden; box-sizing:border-box;}
.pt-homehead{display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
  background:rgba(24,33,46,.92); border:1px solid #334155; border-radius:12px; padding:12px;}
.pt-homehead > div:first-child{min-width:0;}
.pt-homehead .pt-brand{font-size:15px; letter-spacing:1.4px;}
.pt-sessmeta{color:var(--mut); font-size:11.5px; margin-top:5px; letter-spacing:.25px; line-height:1.35;}
.pt-pnl{font-family:var(--disp); font-size:22px; letter-spacing:.15px; text-align:right;
  padding:3px 8px; border:1px solid rgba(79,209,139,.35); border-radius:9px; background:rgba(79,209,139,.08);}
.pt-draftbar{background:rgba(215,165,74,.13); border:1px solid rgba(215,165,74,.7); color:#E9C67B;
