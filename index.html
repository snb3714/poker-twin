@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

:root{
  --bg:#0C0F0E; --surface:#151B18; --raised:#1D2521; --line:#2B352F;
  --text:#EDF3EE; --mut:#7F8D85;
  --gold:#E6B44C; --green:#4CC38A; --red:#E5484D;
  --disp:'Barlow Condensed', ui-sans-serif, system-ui, sans-serif;
  --body:'Inter', ui-sans-serif, system-ui, sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
.pt-root{min-height:100vh; background:var(--bg); color:var(--text); font-family:var(--body); display:flex; justify-content:center;}
.pt-frame{width:100%; max-width:480px; min-height:100vh; display:flex; flex-direction:column; position:relative;}

.pt-brand{font-family:var(--disp); font-weight:700; font-size:22px; letter-spacing:3px; color:var(--gold);}
.pt-question{font-family:var(--disp); font-weight:600; font-size:23px; letter-spacing:.5px; margin:12px 0 10px; text-transform:uppercase;}
.pt-sub{color:var(--mut); font-size:13px; margin-bottom:10px;}
.pt-mut{color:var(--mut);}
.pt-hero{color:var(--gold);} .pt-vill{color:#9DB4C9;}
.pt-win{color:var(--green); font-weight:600;} .pt-loss{color:var(--red); font-weight:600;}

.pt-btn{border:1px solid var(--line); background:var(--surface); color:var(--text);
  border-radius:14px; font-family:var(--disp); font-weight:600; letter-spacing:1px;
  text-transform:uppercase; cursor:pointer; transition:transform .05s, background .1s; width:100%;}
.pt-btn:active{transform:scale(.985); background:var(--raised);}
.pt-btn:disabled{opacity:.3; pointer-events:none;}
.pt-btn-lg{min-height:56px; font-size:20px; padding:0 16px;}
.pt-btn-xl{min-height:68px; font-size:24px;}
.pt-btn-md{min-height:50px; font-size:17px;}
.pt-btn-sm{min-height:40px; font-size:14px; width:auto; padding:0 14px;}
.pt-btn-gold{background:var(--gold); border-color:var(--gold); color:#1A1406;}
.pt-btn-green{background:rgba(76,195,138,.14); border-color:var(--green); color:var(--green);}
.pt-btn-red{background:rgba(229,72,77,.12); border-color:var(--red); color:var(--red);}
.pt-btn-villain{background:rgba(157,180,201,.08); border-color:#3A4A57; color:#9DB4C9;}
.pt-btn-ghost{background:transparent; border-color:var(--line); color:var(--mut);}

.pt-screen{display:flex; flex-direction:column; flex:1; padding:10px 14px 20px;}
.pt-stack{display:flex; flex-direction:column; gap:8px;}
.pt-row{display:flex; gap:10px;}
.pt-wrap{flex-wrap:wrap;}
.pt-grid2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.pt-grid4{display:grid; grid-template-columns:repeat(4,1fr); gap:6px;}

.pt-flow{display:flex; flex-direction:column; flex:1;}
.pt-flowbar{display:flex; align-items:center; gap:10px; padding:6px 10px 0; justify-content:space-between;}
.pt-backbtn,.pt-cancel{background:none; border:none; color:var(--mut); font-family:var(--disp);
  font-size:17px; letter-spacing:1px; cursor:pointer; padding:8px;}
.pt-cancel{margin-left:auto; font-size:19px;}
.pt-flowcrumb{font-family:var(--disp); font-size:16px; letter-spacing:1px; color:var(--mut); display:flex; gap:4px; align-items:center;}

.pt-picked{display:flex; gap:8px; margin-bottom:10px;}
.pt-cardslot{width:48px; height:66px; border:1px dashed var(--line); border-radius:10px;
  display:flex; align-items:center; justify-content:center; font-size:20px; background:var(--surface); color:var(--mut);}
.pt-cardslot.filled{border-style:solid; border-color:var(--gold);}
.pt-rankgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.pt-rankkey{min-height:48px; font-family:var(--disp); font-size:20px; font-weight:600;
  background:var(--surface); border:1px solid var(--line); border-radius:10px; color:var(--text); cursor:pointer;}
.pt-rankkey:active{background:var(--raised);}
.pt-rankkey.sel{border-color:var(--gold); color:var(--gold); background:rgba(230,180,76,.1);}
.pt-rankkey:disabled{opacity:.25; pointer-events:none;}
.pt-suitrow{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:10px;}
.pt-suitkey{min-height:60px; font-size:30px; background:var(--surface); border:1px solid var(--line);
  border-radius:12px; cursor:pointer;}
.pt-suitkey:disabled{opacity:.2; pointer-events:none;}
.pt-suitkey:active{background:var(--raised);}

.pt-board{display:flex; align-items:center; gap:8px; padding:10px 0 0;}
.pt-boardcard{background:var(--surface); border:1px solid var(--line); border-radius:8px;
  padding:6px 9px; font-size:20px;}
.pt-streettag{margin-left:auto; font-family:var(--disp); letter-spacing:2px; text-transform:uppercase;
  color:var(--mut); font-size:14px;}

.pt-modal{position:fixed; inset:0; background:rgba(0,0,0,.72); display:flex; align-items:flex-end; justify-content:center; z-index:20;}
.pt-modal-card{width:100%; max-width:480px; background:var(--bg); border-top:1px solid var(--line);
  border-radius:20px 20px 0 0; padding:18px 16px 26px; max-height:86vh; overflow:auto;}
.pt-numval{font-family:var(--disp); font-size:34px; font-weight:700; margin:4px 0 12px;}
.pt-unit{font-size:20px; color:var(--mut);}
.pt-numgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
.pt-numkey{min-height:52px; font-family:var(--disp); font-size:22px; background:var(--surface);
  border:1px solid var(--line); border-radius:12px; color:var(--text); cursor:pointer;}
.pt-numkey:active{background:var(--raised);}

.pt-home{display:flex; flex-direction:column; flex:1; padding:14px 14px 18px; gap:12px;}
.pt-homehead{display:flex; align-items:flex-start; justify-content:space-between;}
.pt-sessmeta{color:var(--mut); font-size:13px; margin-top:4px;}
.pt-pnl{font-family:var(--disp); font-size:26px;}
.pt-draftbar{background:rgba(230,180,76,.12); border:1px solid var(--gold); color:var(--gold);
  border-radius:12px; min-height:48px; font-family:var(--disp); font-size:17px; letter-spacing:1px; cursor:pointer;}
.pt-filters{display:flex; gap:6px; flex-wrap:wrap;}
.pt-chip{background:var(--surface); border:1px solid var(--line); border-radius:999px; color:var(--mut);
  font-family:var(--disp); font-size:14px; letter-spacing:1px; padding:7px 13px; cursor:pointer;}
.pt-chip.on{border-color:var(--gold); color:var(--gold);}
.pt-handlist{display:flex; flex-direction:column; gap:8px; flex:1;}
.pt-empty{color:var(--mut); text-align:center; padding:32px 20px; font-size:14px; line-height:1.5;}
.pt-hand{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:12px 14px; cursor:pointer;}
.pt-handtop{display:flex; justify-content:space-between; font-family:var(--disp); font-size:17px; letter-spacing:.5px;}
.pt-handmid{display:flex; justify-content:space-between; gap:10px; margin-top:6px; font-size:15px; align-items:baseline;}
.pt-handline{color:var(--mut); font-size:13px; font-family:ui-monospace, monospace; text-align:right;}
.pt-handdetail{margin-top:10px; border-top:1px solid var(--line); padding-top:8px; display:flex; flex-direction:column; gap:6px; font-size:13px;}
.pt-streetrow{display:flex; gap:10px; align-items:baseline; flex-wrap:wrap;}
.pt-streetname{font-family:var(--disp); text-transform:uppercase; letter-spacing:1px; color:var(--gold); font-size:12px; min-width:44px;}
.pt-footrow{justify-content:space-between;}
.pt-export{width:100%; height:220px; background:var(--surface); color:var(--text); border:1px solid var(--line);
  border-radius:10px; font-family:ui-monospace, monospace; font-size:11px; padding:10px; margin-bottom:10px;}
.pt-setup{padding-top:26px;}

.pt-table{position:relative; margin:2px 18px 0; height:200px; padding:0;}
.pt-felt{position:absolute; inset:16% 10%; border-radius:50%;
  background:radial-gradient(ellipse at center, #17211C 0%, #121A16 70%);
  border:1px solid var(--line); box-shadow:inset 0 0 40px rgba(0,0,0,.45);}
.pt-seat{position:absolute; transform:translate(-50%,-50%); width:34px; height:34px;
  border-radius:50%; background:var(--raised); border:1.5px solid var(--line);
  display:flex; align-items:center; justify-content:center; z-index:2;}
.pt-seatpos{font-family:var(--disp); font-weight:700; font-size:10px; letter-spacing:.2px;}
.pt-seat.idle{opacity:.28;}
.pt-seat.hero{border-color:var(--gold); box-shadow:0 0 12px rgba(230,180,76,.35);}
.pt-seat.villain{border-color:#5E7A94;}
.pt-seat.folded{opacity:.3;}
.pt-seat.toact{animation:ptpulse 1.1s ease-in-out infinite;}
@keyframes ptpulse{0%,100%{box-shadow:0 0 0 0 rgba(230,180,76,.5);}50%{box-shadow:0 0 0 7px rgba(230,180,76,0);}}
@media (prefers-reduced-motion: reduce){ .pt-seat.toact{animation:none; box-shadow:0 0 0 3px rgba(230,180,76,.5);} }
.pt-seattag{position:absolute; bottom:-13px; left:50%; transform:translateX(-50%); z-index:4;
  background:var(--gold); color:#1A1406; font-family:var(--disp); font-weight:700;
  font-size:9px; letter-spacing:1.5px; padding:1px 7px; border-radius:999px;}
.pt-seatchip{position:absolute; top:-13px; left:50%; transform:translateX(-50%); z-index:4;
  background:var(--surface); border:1px solid var(--gold); color:var(--gold);
  font-family:ui-monospace, monospace; font-size:10px; font-weight:700;
  padding:1px 7px; border-radius:999px; white-space:nowrap;}
.pt-seatchip.chip-fold{border-color:var(--red); color:var(--red); opacity:.9;}
.pt-dealer{position:absolute; transform:translate(-50%,-50%); width:17px; height:17px;
  border-radius:50%; background:#EDF3EE; color:#121815; font-family:var(--disp);
  font-weight:700; font-size:10px; display:flex; align-items:center; justify-content:center; z-index:3;}
.pt-ctr{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  display:flex; flex-direction:column; align-items:center; gap:6px; z-index:1;}
.pt-slots{display:flex; gap:5px;}
.pt-slot{width:28px; height:39px; border-radius:6px; background:#242E28;
  border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:15px;}
.pt-slot.filled{background:var(--raised); border-color:#4A5750;}
.pt-ctrpot{font-family:var(--disp); font-size:11px; letter-spacing:1.5px; color:var(--mut);
  background:rgba(0,0,0,.25); border:1px solid var(--line); border-radius:999px; cursor:pointer;
  display:flex; flex-direction:row; align-items:baseline; gap:5px; padding:4px 12px;}
.pt-ctrpot b{color:var(--gold); font-size:14px;}
.pt-ctrabs{font-family:var(--body); font-size:10px; letter-spacing:0; color:var(--mut); opacity:.85;}
.pt-ctredit{font-size:10px; color:var(--gold); opacity:.8;}
.pt-herocards{position:absolute; transform:translate(-50%,-50%); display:flex; gap:4px; z-index:2;}
.pt-minicard{width:25px; height:34px; font-size:12px; box-shadow:0 2px 6px rgba(0,0,0,.4);}
.pt-straddlechip{align-self:flex-start; margin-bottom:12px;}
.pt-seattag.tag-str{background:var(--surface); color:var(--gold); border:1px solid var(--gold);}
.pt-replayhead{display:flex; justify-content:space-between; align-items:baseline;
  font-family:var(--disp); font-size:17px; letter-spacing:.5px; margin-bottom:2px;}
.pt-caption{margin-top:14px; text-align:center; font-family:var(--disp); font-size:17px;
  letter-spacing:.5px; min-height:24px;}
.pt-caption-final{color:var(--gold);}
.pt-stepcount{display:flex; align-items:center; justify-content:center; min-width:64px;
  font-family:var(--disp); font-size:15px; color:var(--mut); letter-spacing:1px;}

.pt-tracker{margin:12px 14px 0; background:var(--surface); border:1px solid var(--line);
  border-radius:12px; padding:7px 10px; display:flex; flex-direction:column; gap:3px;
  font-size:12px; max-height:96px; overflow-y:auto;}
.pt-trrow{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; line-height:1.5;}
.pt-trhead{font-family:var(--disp); font-size:14px; letter-spacing:.5px;}
.pt-trpot{color:var(--gold); font-weight:700; letter-spacing:1px;}
.pt-pfrchip{background:rgba(230,180,76,.1); border:1px solid var(--line); color:var(--mut);
  border-radius:999px; font-family:var(--disp); font-size:12px; letter-spacing:1px;
  padding:2px 10px; cursor:pointer;}
.pt-trcards{margin-left:auto; font-size:15px; display:flex; gap:3px;}
.pt-trstreet{font-family:var(--disp); color:var(--gold); font-weight:700; min-width:14px;}
.pt-trboard{display:flex; gap:3px; font-size:14px;}
.pt-tracts{color:var(--mut); font-family:ui-monospace, monospace; font-size:12px;}

.pt-sizing{background:var(--raised); border:1px solid var(--line); border-radius:14px;
  padding:12px; display:flex; flex-direction:column; animation:ptdrop .12s ease-out;}
.pt-sizinghead{display:flex; align-items:baseline; font-family:var(--disp); font-size:15px;
  letter-spacing:1px; text-transform:uppercase; color:var(--gold); margin-bottom:10px;}
@keyframes ptdrop{from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:none;}}
@media (prefers-reduced-motion: reduce){ .pt-sizing{animation:none;} }
